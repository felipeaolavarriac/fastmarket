<div class="container mt-4">
  <div class="card p-4 shadow-sm">
    <h2>Realizar Compra</h2>
    <label>Producto:</label>
    <input type="text" [(ngModel)]="producto" class="form-control mb-2">
    
    <label>Cantidad:</label>
    <input type="number" [(ngModel)]="cantidad" class="form-control mb-2">
    
    <label>Dirección de Envío:</label>
    <input type="text" [(ngModel)]="direccion" class="form-control mb-3">
    
    <button (click)="registrarCompra()" class="btn btn-success">Finalizar Compra</button>
  </div>
</div>
