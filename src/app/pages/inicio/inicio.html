<div class="auth-container">
  
  <div class="auth-card">
    <h2>{{ esRegistro ? 'Crear Cuenta' : 'Ingreso Tienda' }}</h2>

    <div class="form-group">
      <label>Gmail</label>
      <input type="email" [(ngModel)]="gmail" placeholder="ejemplo@gmail.com">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="clave" placeholder="••••••••">
    </div>

    <div class="form-group" *ngIf="esRegistro">
      <label>Fecha de Nacimiento</label>
      <input type="date" [(ngModel)]="fechaNacimiento">
    </div>

    <div class="actions">
      <button *ngIf="!esRegistro" (click)="login()" class="btn-main">
        Ingresar
      </button>
      
      <button *ngIf="esRegistro" (click)="registrar()" class="btn-main btn-reg">
        Registrarme
      </button>
    </div>

    <p class="toggle-text">
      {{ esRegistro ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?' }}
      <span (click)="esRegistro = !esRegistro; limpiarCampos()">
        {{ esRegistro ? 'Inicia Sesión' : 'Regístrate aquí' }}
      </span>
    </p>
  </div>

</div>
